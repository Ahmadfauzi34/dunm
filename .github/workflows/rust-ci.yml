name: RRM Rust CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        # shared-key dihapus: rust-cache akan otomatis membuat kunci 
        # berdasarkan nama job ("Format & Lint") dan versi Rust.

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # clippy otomatis mencakup pengecekan 'cargo check'
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        # Karena tidak ada shared-key, job ini akan memiliki cache terpisah 
        # khusus untuk build mode --release, mencegah cache thrashing.

      - name: cargo test --release
        run: cargo test --release --all-features
