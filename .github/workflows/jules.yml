name: Jules Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  jules:
    name: Run Jules AI Reviewer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      !contains(github.event.pull_request.title, '[skip-jules]') &&
      github.event.pull_request.changed_files > 0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Jules API Key
        run: |
          if [ -z "${{ secrets.JULES_API_KEY }}" ]; then
            echo "::error::JULES_API_KEY tidak di-set di repository secrets."
            echo "::error::Tambahkan di Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi
          echo "✅ JULES_API_KEY tervalidasi"

      - name: Run Jules
        uses: google-labs-code/jules-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          jules_api_key: ${{ secrets.JULES_API_KEY }}

      - name: Check Jules review status
        if: failure()
        run: |
          echo "::error::Jules menemukan issue kritikal atau gagal berjalan."
          echo "::error::Silakan cek tab 'Checks' atau 'Conversation' untuk detail review."
          exit 1
