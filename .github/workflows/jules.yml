# .github/workflows/jules.yml
name: Jules Agent

on: 
  pull_request:
    types: [opened, synchronize, reopened] # Memastikan Jules berjalan saat PR di-update

jobs:
  jules:
    name: Run Jules AI Reviewer
    runs-on: ubuntu-latest
    steps:
      - name: Run Jules
        uses: google-labs-code/jules-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
